name: Deploy to Ubuntu

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'customer/package-lock.json'

      - name: Install dependencies
        run: |
          cd customer
          npm ci

      - name: Build project
        run: |
          cd customer
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # Add other env variables here if needed for build time

      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "customer/.next,customer/public,customer/package.json,customer/package-lock.json,customer/next.config.ts"
          target: "/var/www/erp"
          strip_components: 1

      - name: SSH into server and restart app
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /var/www/erp
            npm install --production
            
            # Create .env file from secret
            echo "${{ secrets.ENV_PRODUCTION }}" > .env.local
            
            # Restart or start the app with PM2
            pm2 delete erp || true
            pm2 start npm --name "erp" -- start -- -p 3000
            pm2 save
